services:
  capture:
    build: .
    container_name: tapo-capture
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./frames:/frames          # change left side to any host path, e.g. /mnt/usb/frames
      - ./logs:/logs              # change left side to any host path, e.g. /mnt/nas/logs
      - ./config.yaml:/app/config.yaml:ro
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
